<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deezer Manager - Iniciar Sesión</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js" defer></script>
    <script src="js/theme.js" defer></script>
</head>
<body>

    <header class="header">
        <div class="header__logo-container">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            <h1 class="header__logo">Deezer<span>Manager</span></h1>
        </div>
        
        <div class="theme-toggle-wrapper">
            <label class="theme-switch" for="btnTheme">
                <input type="checkbox" id="btnTheme" />
                <div class="slider">
                    <span class="icon icon--sun">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                    <span class="icon icon--moon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </span>
                </div>
            </label>
        </div>
    </header>

    <main class="login-container">
        <div class="form-card">
            <div class="form-card__header">
                <h2>¡Bienvenido de nuevo!</h2>
                <p>Ingresa tus credenciales para conectarte al servidor.</p>
            </div>
            
            <form id="loginForm" class="pm-form">
                <div class="pm-form__field">
                    <label for="email" class="pm-form__label">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="pm-form__input" 
                        placeholder="ejemplo@email.com" 
                        required
                    >
                </div>

                <div class="pm-form__field">
                    <label for="password" class="pm-form__label">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="pm-form__input" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="pm-form__actions">
                    <button type="submit" id="submitBtn" class="btn btn--primary">
                        Iniciar Sesión
                    </button>
                </div>
            </form>

            <div style="margin-top: 1.75rem; display: flex; flex-direction: column; gap: 0.85rem; text-align: center;">
                <a href="recuperar-contraseña.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 500;">
                    ¿Olvidaste tu contraseña?
                </a>
                <a href="registro.html" style="color: var(--primary); text-decoration: none; font-size: 0.95rem; font-weight: 600;">
                    Crear cuenta nueva
                </a>
            </div>

        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
